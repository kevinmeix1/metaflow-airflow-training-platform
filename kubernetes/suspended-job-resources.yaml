apiVersion: batch/v1
kind: Job
metadata:
  name: partitioned-backfill-job
  namespace: mlops-training
  annotations:
    platform.mlops.dev/feature-gate: MutablePodResourcesForSuspendedJobs
    platform.mlops.dev/resource-mutation-reason: partition-manifest-and-quota-fit
spec:
  suspend: true
  completionMode: Indexed
  completions: 8
  parallelism: 4
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: ghcr.io/kevinmeix1/metaflow-training-worker:2026.07
          resources:
            requests:
              cpu: "6"
              memory: 24Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 32Gi
              nvidia.com/gpu: "1"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: failed-partition-replay-job
  namespace: mlops-training
  annotations:
    platform.mlops.dev/feature-gate: MutablePodResourcesForSuspendedJobs
    platform.mlops.dev/resource-mutation-reason: checkpointed-replay-pool-fit
spec:
  suspend: true
  completionMode: Indexed
  completions: 3
  parallelism: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: replayer
          image: ghcr.io/kevinmeix1/metaflow-partition-replay:2026.07
          resources:
            requests:
              cpu: "3"
              memory: 6Gi
            limits:
              cpu: "4"
              memory: 8Gi
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: training-suspended-job-resource-mutation-guard
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: ["batch"]
        apiVersions: ["v1"]
        operations: ["UPDATE"]
        resources: ["jobs"]
  validations:
    - expression: "!(has(oldObject) && oldObject.spec.template.spec.containers[0].resources != object.spec.template.spec.containers[0].resources && object.spec.suspend != true)"
      message: "MutablePodResourcesForSuspendedJobs allows resource mutation only while spec.suspend is true"
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: training-suspended-job-resources
  namespace: mlops-training
spec:
  groups:
    - name: training.suspended-job-resources
      rules:
        - alert: TrainingSuspendedJobResizeStale
          expr: max(training_suspended_job_resource_patch_age_seconds{namespace="mlops-training"}) > 900
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Suspended training Job resource mutation has not been unsuspended or reverted
        - alert: TrainingSuspendedJobUnsuspendWithoutQuotaFit
          expr: max(training_suspended_job_unsuspend_without_quota_fit{namespace="mlops-training"}) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: Training Job was unsuspended before quota, partition, and checkpoint evidence was recorded
