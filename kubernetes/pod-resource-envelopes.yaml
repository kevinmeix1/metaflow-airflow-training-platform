apiVersion: v1
kind: Pod
metadata:
  name: partition-manifest-builder
  namespace: mlops-training
  labels:
    app.kubernetes.io/name: metaflow-airflow-training-platform
    app.kubernetes.io/component: pod-resource-envelope
    platform.mlops.dev/gate-owner: manifest-control
spec:
  schedulingGates:
    - name: mlops.kevinmei.dev/manifest-inputs-ready
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "3"
      memory: 6Gi
  restartPolicy: Never
  containers:
    - name: manifest-builder
      image: ghcr.io/kevinmeix1/metaflow-airflow-training-platform:2026.07.0
      command: ["python", "-m", "training_orchestration_platform", "plan-backfill", "--start", "2026-06-01", "--end", "2026-06-07"]
      resources:
        requests:
          cpu: 1200m
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
    - name: otel-sidecar
      image: otel/opentelemetry-collector-contrib:0.136.0
      args: ["--config=/etc/otel/config.yaml"]
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: metaflow-training-worker
  namespace: mlops-training
  labels:
    app.kubernetes.io/name: metaflow-airflow-training-platform
    app.kubernetes.io/component: pod-resource-envelope
    platform.mlops.dev/gate-owner: training-wave
spec:
  schedulingGates:
    - name: mlops.kevinmei.dev/kueue-admitted
    - name: mlops.kevinmei.dev/artifact-volume-ready
  resources:
    requests:
      cpu: "6"
      memory: 12Gi
    limits:
      cpu: "8"
      memory: 16Gi
  restartPolicy: Never
  containers:
    - name: metaflow-worker
      image: ghcr.io/kevinmeix1/metaflow-airflow-training-platform:2026.07.0
      command: ["python", "-m", "training_orchestration_platform", "run", "--date", "2026-06-07"]
      resources:
        requests:
          cpu: "5"
          memory: 10Gi
        limits:
          cpu: "7"
          memory: 14Gi
    - name: checkpoint-writer
      image: ghcr.io/kevinmeix1/metaflow-airflow-training-platform:2026.07.0
      command: ["python", "-m", "training_orchestration_platform", "trace-report"]
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: failed-partition-replay
  namespace: mlops-training
  labels:
    app.kubernetes.io/name: metaflow-airflow-training-platform
    app.kubernetes.io/component: pod-resource-envelope
    platform.mlops.dev/gate-owner: replay-control
spec:
  schedulingGates:
    - name: mlops.kevinmei.dev/replay-window-approved
    - name: mlops.kevinmei.dev/bundle-version-pinned
  resources:
    requests:
      cpu: "3"
      memory: 6Gi
    limits:
      cpu: "5"
      memory: 10Gi
  restartPolicy: Never
  containers:
    - name: replay-runner
      image: ghcr.io/kevinmeix1/metaflow-airflow-training-platform:2026.07.0
      command: ["python", "-m", "training_orchestration_platform", "backfill", "--start", "2026-06-06", "--end", "2026-06-06", "--force"]
      resources:
        requests:
          cpu: "2"
          memory: 4Gi
        limits:
          cpu: "4"
          memory: 8Gi
    - name: lineage-exporter
      image: ghcr.io/kevinmeix1/metaflow-airflow-training-platform:2026.07.0
      command: ["python", "-m", "training_orchestration_platform", "trace-report"]
      resources:
        requests:
          cpu: 400m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
