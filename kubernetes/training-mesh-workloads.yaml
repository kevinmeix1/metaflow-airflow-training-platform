apiVersion: v1
kind: Namespace
metadata:
  name: ml-training
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demand-training-runner
  namespace: ml-training
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demand-training-config
  namespace: ml-training
data:
  MLFLOW_EXPERIMENT: daily-demand-forecasting
  CONTRACT_PATH: contracts/demand_training_contract.yml
  BACKFILL_POLICY: idempotent-partitioned
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demand-training-runner
  namespace: ml-training
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demand-training-runner
  namespace: ml-training
subjects:
  - kind: ServiceAccount
    name: demand-training-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: demand-training-runner
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: demand-training-daily
  namespace: ml-training
spec:
  schedule: "45 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      parallelism: 4
      completions: 4
      completionMode: Indexed
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: demand-training-runner
          restartPolicy: Never
          containers:
            - name: partition-trainer
              image: ghcr.io/kevinmeix1/metaflow-airflow-training-platform:latest
              command: ["bash", "-lc"]
              args:
                - "make run && make dashboard"
              envFrom:
                - configMapRef:
                    name: demand-training-config
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "2"
                  memory: "2Gi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
