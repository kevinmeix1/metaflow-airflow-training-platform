apiVersion: v1
kind: ConfigMap
metadata:
  name: demand-training-governance-policy
  namespace: ml-training
  labels:
    app.kubernetes.io/name: governance-evidence
    app.kubernetes.io/part-of: metaflow-airflow-training-platform
data:
  required_evidence: |
    - model-card
    - data-card
    - risk-register
    - approval-record
    - reproducibility-manifest
  promotion_policy: |
    training artifact approval requires partition manifest, data gates, model gates, lineage, and backfill history
---
apiVersion: batch/v1
kind: Job
metadata:
  name: demand-training-evidence-bundle
  namespace: ml-training
  labels:
    app.kubernetes.io/name: governance-evidence
spec:
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: governance-evidence
    spec:
      restartPolicy: Never
      serviceAccountName: training-runner
      containers:
        - name: evidence
          image: ghcr.io/kevinmeix1/metaflow-airflow-training-platform@sha256:replace-with-built-image-digest
          command: ["python", "-m", "training_orchestration_platform", "governance-bundle", "--output", "/workspace"]
          env:
            - name: REQUIRED_EVIDENCE
              value: "model-card,data-card,risk-register,approval-record,reproducibility-manifest"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: demand-training-monthly-governance-review
  namespace: ml-training
  labels:
    app.kubernetes.io/name: governance-evidence
spec:
  schedule: "0 8 1 * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: review
              image: ghcr.io/kevinmeix1/metaflow-airflow-training-platform@sha256:replace-with-built-image-digest
              command: ["python", "-m", "training_orchestration_platform", "governance-bundle", "--output", "/workspace"]
              resources:
                requests:
                  cpu: "250m"
                  memory: "256Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
                runAsNonRoot: true
