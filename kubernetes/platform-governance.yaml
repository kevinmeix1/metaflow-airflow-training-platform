apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: training-backfill-priority
value: 80000
globalDefault: false
description: "Priority for bounded training backfills and recovery jobs."
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: training-compute-quota
  namespace: ml-training
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    pods: "80"
    count/jobs.batch: "40"
    count/cronjobs.batch: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: training-default-limits
  namespace: ml-training
spec:
  limits:
    - type: Container
      default:
        cpu: "2"
        memory: 2Gi
      defaultRequest:
        cpu: 500m
        memory: 1Gi
      max:
        cpu: "8"
        memory: 16Gi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: demand-training-workers
  namespace: ml-training
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metaflow-airflow-training-platform
