apiVersion: v1
kind: ConfigMap
metadata:
  name: demand-training-queue-simulation
  namespace: mlops-training
  labels:
    app.kubernetes.io/name: daily-demand-training
    app.kubernetes.io/component: queue-simulation
data:
  nominal_cpu: "18"
  nominal_memory_gib: "72"
  nominal_gpu: "1"
  airflow_pool_slots: "9"
  critical_priority_floor: "900"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: training-failed-partition-recovery
value: 100000
globalDefault: false
description: "Failed partition recovery may preempt exploratory feature sweeps."
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demand-training-queue-pressure
  namespace: mlops-training
spec:
  groups:
    - name: demand-training.queue-simulation
      rules:
        - alert: DemandTrainingQueuePressureHigh
          expr: |
            sum(kueue_pending_workloads{cluster_queue="demand-training-cluster-queue"}) > 4
          for: 20m
          labels:
            severity: warning
            owner: training-platform
          annotations:
            summary: Training queue has sustained pending backfill workloads.
            runbook_url: docs/queue-capacity-simulation.md
