apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: training-control-plane-zpages
  namespace: mlops-training
  labels:
    platform.mlops.dev/control: control-plane-diagnostics
spec:
  selector:
    matchLabels:
      component: kube-control-plane
  namespaceSelector:
    matchNames:
      - kube-system
  endpoints:
    - port: https
      path: /statusz
      interval: 60s
      scheme: https
    - port: https
      path: /flagz
      interval: 300s
      scheme: https
    - port: https
      path: /metrics
      interval: 30s
      scheme: https
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: training-control-plane-diagnostics
  namespace: mlops-training
spec:
  groups:
    - name: training.control-plane.freshness
      rules:
        - alert: TrainingBackfillControllerCacheStale
          expr: max(mlops_controller_resource_version_lag_seconds{controller=~"metaflow-backfill-controller|model-registration-controller|failed-partition-replay-controller"}) > 60
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Training backfill automation is reconciling from stale cache state
            runbook: docs/control-plane-diagnostics.md
        - alert: ComponentFlagDrift
          expr: max(kube_component_flag_drift{feature_gate=~"ComponentStatusz|ComponentFlagz|KubeletPSI|NativeHistogramMetrics"}) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Kubernetes component /flagz drift detected
        - alert: KubeletPSIMemoryStallHigh
          expr: max(rate(kubelet_psi_memory_some_seconds_total[5m])) > 0.2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Training node memory pressure stall information is elevated
        - alert: NativeHistogramStorageBudgetHigh
          expr: max(prometheus_tsdb_head_series{job="kube-apiserver", histogram_type="native"}) > 500000
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Native histogram series budget is above the training release profile
