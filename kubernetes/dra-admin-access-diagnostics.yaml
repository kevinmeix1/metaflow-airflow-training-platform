apiVersion: v1
kind: Namespace
metadata:
  name: mlops-training-dra-admin
  labels:
    resource.kubernetes.io/admin-access: "true"
    pod-security.kubernetes.io/enforce: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dra-admin-diagnostic-runner
  namespace: mlops-training-dra-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dra-admin-access-claim-manager
  namespace: mlops-training-dra-admin
rules:
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims", "resourceclaimtemplates"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dra-admin-access-claim-manager
  namespace: mlops-training-dra-admin
subjects:
  - kind: ServiceAccount
    name: dra-admin-diagnostic-runner
    namespace: mlops-training-dra-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dra-admin-access-claim-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: training-status-reader
  namespace: mlops-training
rules:
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dra-admin-diagnostic-training-reader
  namespace: mlops-training
subjects:
  - kind: ServiceAccount
    name: dra-admin-diagnostic-runner
    namespace: mlops-training-dra-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: training-status-reader
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: training-backfill-admin-health
  namespace: mlops-training-dra-admin
  labels:
    mlops.io/diagnostic-purpose: admin-access-training-health
    mlops.io/target-workload: feature-heavy-backfill
  annotations:
    mlops.io/cleanup-after-minutes: "15"
    mlops.io/metaflow-run-required: "true"
    mlops.io/mlflow-run-required: "true"
spec:
  devices:
    requests:
      - name: gpu
        exactly:
          deviceClassName: gpu-l4-shared
          allocationMode: All
          adminAccess: true
          selectors:
            - cel:
                expression: "device.driver == 'gpu.resource.kubernetes.io'"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: training-dra-admin-access-snapshot
  namespace: mlops-training-dra-admin
  labels:
    mlops.io/component: dra-admin-access-diagnostics
spec:
  ttlSecondsAfterFinished: 900
  template:
    metadata:
      labels:
        mlops.io/component: dra-admin-access-diagnostics
    spec:
      serviceAccountName: dra-admin-diagnostic-runner
      restartPolicy: Never
      containers:
        - name: collect-training-evidence
          image: ghcr.io/kevinmeix1/training-diagnostic-runner:2026.07.08
          imagePullPolicy: IfNotPresent
          args:
            - "--claim=training-backfill-admin-health"
            - "--target-namespace=mlops-training"
            - "--target-workload=feature-heavy-backfill"
            - "--evidence=allocatedResourcesStatus,ResourceClaim.status.devices,airflow.map_index,metaflow.run_id,mlflow.run_id"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: training-dra-admin-access-diagnostics
  namespace: mlops-training-dra-admin
spec:
  groups:
    - name: training.dra.admin.access
      rules:
        - alert: TrainingDRAAdminAccessClaimRunningTooLong
          expr: kube_resourceclaim_created{namespace="mlops-training-dra-admin"} > 900
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "A privileged training DRA AdminAccess ResourceClaim exceeded its cleanup window"
        - alert: TrainingDRAAdminAccessWithoutRun
          expr: kube_resourceclaim_labels{namespace="mlops-training-dra-admin",label_mlops_io_metaflow_run_required!="true"} > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "A privileged training DRA AdminAccess claim is missing Metaflow run linkage"
