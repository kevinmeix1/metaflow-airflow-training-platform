apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: require-training-runtime-guardrails
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  validations:
    - expression: "object.spec.containers.all(c, has(c.resources.requests) && has(c.resources.limits))"
      message: "Training containers must define resource requests and limits."
    - expression: "object.spec.containers.all(c, has(c.securityContext) && c.securityContext.allowPrivilegeEscalation == false)"
      message: "Privilege escalation must be disabled."
    - expression: "object.spec.containers.all(c, has(c.securityContext) && c.securityContext.readOnlyRootFilesystem == true)"
      message: "Training pods should use read-only root filesystems."
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: require-training-runtime-guardrails
spec:
  policyName: require-training-runtime-guardrails
  validationActions: ["Deny", "Audit"]
---
apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: require-signed-immutable-training-images
spec:
  matchImageReferences:
    - glob: ghcr.io/kevinmeix1/metaflow-airflow-training-platform*
  validationConfigurations:
    mutateDigest: true
    verifyDigest: true
    required: true
  attestations:
    - name: slsa-provenance
      intoto:
        type: https://slsa.dev/provenance/v1
