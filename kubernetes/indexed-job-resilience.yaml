apiVersion: v1
kind: ConfigMap
metadata:
  name: indexed-job-resilience-runbook
  namespace: ml-training
  labels:
    app.kubernetes.io/name: metaflow-airflow-training-platform
    platform.openai.com/component: indexed-job-resilience
data:
  airflowBackfillCreate: >-
    airflow backfill create --dag-id enterprise_backfill_training_mesh --from-date 2026-06-01 --to-date 2026-06-07 --reprocess-behavior failed --max-active-runs 2 --run-backwards
  shardContract: "JOB_COMPLETION_INDEX selects partition/domain/model_family from the immutable manifest."
  recoveryPolicy: "Recover failedIndexes only; do not re-run completedIndexes unless the data contract changed."
---
apiVersion: batch/v1
kind: Job
metadata:
  name: demand-training-indexed-resilience
  namespace: ml-training
  labels:
    app.kubernetes.io/name: metaflow-airflow-training-platform
    app.kubernetes.io/component: indexed-job-resilience
    kueue.x-k8s.io/queue-name: demand-training-queue
    kueue.x-k8s.io/priority-class: backfill-critical
spec:
  parallelism: 6
  completions: 12
  completionMode: Indexed
  backoffLimitPerIndex: 1
  maxFailedIndexes: 2
  activeDeadlineSeconds: 7200
  ttlSecondsAfterFinished: 86400
  successPolicy:
    rules:
      - succeededCount: 10
  podFailurePolicy:
    rules:
      - action: Ignore
        onPodConditions:
          - type: DisruptionTarget
      - action: FailIndex
        onExitCodes:
          containerName: partition-trainer
          operator: In
          values: [42]
      - action: FailJob
        onExitCodes:
          containerName: partition-trainer
          operator: In
          values: [78, 126]
  template:
    metadata:
      labels:
        app.kubernetes.io/component: partition-trainer
        training-wave: indexed-resilience
    spec:
      serviceAccountName: demand-training-runner
      restartPolicy: Never
      containers:
        - name: partition-trainer
          image: ghcr.io/kevinmeix1/metaflow-airflow-training-platform:2026.07.0
          command: ["bash", "-lc"]
          args:
            - >-
              echo "running shard ${JOB_COMPLETION_INDEX}" &&
              python -m training_orchestration_platform run --output .local --date 2026-06-01
          env:
            - name: SHARD_SOURCE
              value: "JOB_COMPLETION_INDEX"
            - name: FAILURE_CONTRACT_EXIT_CODE
              value: "42"
          resources:
            requests:
              cpu: "750m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: indexed-job-resilience-alerts
  namespace: ml-training
  labels:
    app.kubernetes.io/name: metaflow-airflow-training-platform
    prometheus: platform
spec:
  groups:
    - name: training.indexed-job-resilience
      rules:
        - alert: TrainingIndexedJobFailedIndexesHigh
          expr: kube_job_status_failed{namespace="ml-training",job_name=~"demand-training-indexed.*"} > 2
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Indexed training job exceeded failed-index budget.
            runbook: "Inspect status.failedIndexes and launch failed-only Airflow backfill recovery."
        - alert: TrainingIndexedJobShardRetryHigh
          expr: increase(kube_pod_container_status_restarts_total{namespace="ml-training",container="partition-trainer"}[30m]) > 3
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Partition trainer restart pressure is above the per-index retry budget.
            runbook: "Check podFailurePolicy matches and stop retry storms before GPU quota is wasted."
        - alert: AirflowBackfillConcurrencySaturated
          expr: airflow_dagrun_running{dag_id="enterprise_backfill_training_mesh"} >= 2
          for: 20m
          labels:
            severity: warning
          annotations:
            summary: Airflow backfill max_active_runs is saturated.
            runbook: "Keep failed-only recovery bounded and protect fresh training partitions."
