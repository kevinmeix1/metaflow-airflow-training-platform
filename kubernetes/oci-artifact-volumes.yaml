apiVersion: v1
kind: ConfigMap
metadata:
  name: training-artifact-volume-contract
  namespace: ml-training
  labels:
    app.kubernetes.io/name: metaflow-airflow-training-platform
    app.kubernetes.io/component: artifact-locality
data:
  contract.yaml: |
    feature_state: Kubernetes v1.36 stable image volume
    minimum_server_version: v1.31
    recommended_server_version: v1.36
    pull_policy: IfNotPresent
    fallback_path: PVC/S3 artifact copy template
    artifacts:
      - name: training-dataset-snapshot
        mountPath: /mnt/artifacts/dataset
      - name: feature-contract-bundle
        mountPath: /mnt/artifacts/contracts
      - name: candidate-model-bundle
        mountPath: /mnt/artifacts/model
      - name: evaluation-baseline-bundle
        mountPath: /mnt/artifacts/baselines
---
apiVersion: batch/v1
kind: Job
metadata:
  name: training-artifact-volume-smoke
  namespace: ml-training
  labels:
    app.kubernetes.io/name: metaflow-airflow-training-platform
    app.kubernetes.io/component: artifact-locality
    kueue.x-k8s.io/queue-name: demand-training-queue
  annotations:
    mlops.kevinmei.dev/evidence: oci_artifact_volume_plan.json
    mlops.kevinmei.dev/fallback: pvc-s3-artifact-copy
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metaflow-airflow-training-platform
        app.kubernetes.io/component: artifact-locality
        training.kevinmei.dev/artifact-locality: oci-image-volume
    spec:
      restartPolicy: Never
      serviceAccountName: demand-training-runner
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: artifact-smoke
          image: ghcr.io/kevinmeix1/metaflow-airflow-training-platform:2026.07.0
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -lc
            - |
              set -euo pipefail
              find /mnt/artifacts -maxdepth 2 -type f | sort | head -20
              test -d /mnt/artifacts/dataset
              test -d /mnt/artifacts/contracts
              test -d /mnt/artifacts/model
              test -d /mnt/artifacts/baselines
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: dataset-snapshot
              mountPath: /mnt/artifacts/dataset
              readOnly: true
            - name: feature-contracts
              mountPath: /mnt/artifacts/contracts
              readOnly: true
            - name: candidate-model
              mountPath: /mnt/artifacts/model
              readOnly: true
            - name: evaluation-baseline
              mountPath: /mnt/artifacts/baselines
              readOnly: true
            - name: artifact-contract
              mountPath: /etc/mlops/artifact-contract
              readOnly: true
      volumes:
        - name: dataset-snapshot
          image:
            reference: ghcr.io/kevinmeix1/demand-training-dataset@sha256:1111111111111111111111111111111111111111111111111111111111111111
            pullPolicy: IfNotPresent
        - name: feature-contracts
          image:
            reference: ghcr.io/kevinmeix1/demand-feature-contracts@sha256:2222222222222222222222222222222222222222222222222222222222222222
            pullPolicy: IfNotPresent
        - name: candidate-model
          image:
            reference: ghcr.io/kevinmeix1/demand-candidate-model@sha256:3333333333333333333333333333333333333333333333333333333333333333
            pullPolicy: IfNotPresent
        - name: evaluation-baseline
          image:
            reference: ghcr.io/kevinmeix1/demand-evaluation-baseline@sha256:4444444444444444444444444444444444444444444444444444444444444444
            pullPolicy: IfNotPresent
        - name: artifact-contract
          configMap:
            name: training-artifact-volume-contract
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: training-artifact-volume-warmup
  namespace: ml-training
  labels:
    app.kubernetes.io/name: metaflow-airflow-training-platform
    app.kubernetes.io/component: artifact-locality
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 900
      template:
        metadata:
          labels:
            app.kubernetes.io/name: metaflow-airflow-training-platform
            training.kevinmei.dev/artifact-locality: warmup
        spec:
          restartPolicy: Never
          serviceAccountName: demand-training-runner
          containers:
            - name: cache-warmup
              image: ghcr.io/kevinmeix1/metaflow-airflow-training-platform:2026.07.0
              imagePullPolicy: IfNotPresent
              command: ["bash", "-lc", "du -sh /mnt/artifacts/* || true"]
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: dataset-snapshot
                  mountPath: /mnt/artifacts/dataset
                  readOnly: true
                - name: feature-contracts
                  mountPath: /mnt/artifacts/contracts
                  readOnly: true
                - name: candidate-model
                  mountPath: /mnt/artifacts/model
                  readOnly: true
                - name: evaluation-baseline
                  mountPath: /mnt/artifacts/baselines
                  readOnly: true
          volumes:
            - name: dataset-snapshot
              image:
                reference: ghcr.io/kevinmeix1/demand-training-dataset@sha256:1111111111111111111111111111111111111111111111111111111111111111
                pullPolicy: IfNotPresent
            - name: feature-contracts
              image:
                reference: ghcr.io/kevinmeix1/demand-feature-contracts@sha256:2222222222222222222222222222222222222222222222222222222222222222
                pullPolicy: IfNotPresent
            - name: candidate-model
              image:
                reference: ghcr.io/kevinmeix1/demand-candidate-model@sha256:3333333333333333333333333333333333333333333333333333333333333333
                pullPolicy: IfNotPresent
            - name: evaluation-baseline
              image:
                reference: ghcr.io/kevinmeix1/demand-evaluation-baseline@sha256:4444444444444444444444444444444444444444444444444444444444444444
                pullPolicy: IfNotPresent
